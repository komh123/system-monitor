<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Remote Control 監控系統 - 技術文件</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      color: #e2e8f0;
      line-height: 1.6;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    header {
      text-align: center;
      padding: 3rem 0;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      margin-bottom: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .version {
      color: #94a3b8;
      font-size: 0.9rem;
    }

    .back-button {
      display: inline-block;
      margin-bottom: 2rem;
      padding: 0.75rem 1.5rem;
      background: rgba(59, 130, 246, 0.1);
      color: #3b82f6;
      text-decoration: none;
      border-radius: 8px;
      border: 1px solid rgba(59, 130, 246, 0.3);
      transition: all 0.3s ease;
    }

    .back-button:hover {
      background: rgba(59, 130, 246, 0.2);
      transform: translateY(-2px);
    }

    .content-wrapper {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .toc {
      background: rgba(59, 130, 246, 0.1);
      border-left: 4px solid #3b82f6;
      padding: 1.5rem;
      margin-bottom: 2rem;
      border-radius: 8px;
    }

    .toc h2 {
      color: #3b82f6;
      margin-bottom: 1rem;
      font-size: 1.3rem;
    }

    .toc ul {
      list-style: none;
    }

    .toc li {
      padding: 0.5rem 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .toc li:last-child {
      border-bottom: none;
    }

    .toc a {
      color: #94a3b8;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .toc a:hover {
      color: #3b82f6;
    }

    .markdown-content {
      color: #cbd5e1;
    }

    .markdown-content h2 {
      color: #f1f5f9;
      margin: 2rem 0 1rem 0;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid rgba(59, 130, 246, 0.3);
      font-size: 1.8rem;
    }

    .markdown-content h3 {
      color: #e2e8f0;
      margin: 1.5rem 0 0.75rem 0;
      font-size: 1.4rem;
    }

    .markdown-content h4 {
      color: #cbd5e1;
      margin: 1rem 0 0.5rem 0;
      font-size: 1.1rem;
    }

    .markdown-content p {
      margin: 1rem 0;
    }

    .markdown-content code {
      background: rgba(0, 0, 0, 0.3);
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      font-family: 'Monaco', 'Menlo', 'Courier New', monospace;
      font-size: 0.9em;
      color: #fbbf24;
    }

    .markdown-content pre {
      background: rgba(0, 0, 0, 0.4);
      padding: 1rem;
      border-radius: 8px;
      overflow-x: auto;
      margin: 1rem 0;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .markdown-content pre code {
      background: none;
      padding: 0;
      color: #e2e8f0;
    }

    .markdown-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      overflow: hidden;
    }

    .markdown-content th,
    .markdown-content td {
      padding: 0.75rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
      text-align: left;
    }

    .markdown-content th {
      background: rgba(59, 130, 246, 0.2);
      color: #3b82f6;
      font-weight: 600;
    }

    .markdown-content tr:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .markdown-content ul,
    .markdown-content ol {
      margin: 1rem 0;
      padding-left: 2rem;
    }

    .markdown-content li {
      margin: 0.5rem 0;
    }

    .markdown-content blockquote {
      border-left: 4px solid #8b5cf6;
      padding-left: 1rem;
      margin: 1rem 0;
      color: #a78bfa;
      font-style: italic;
    }

    .markdown-content a {
      color: #3b82f6;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .markdown-content a:hover {
      color: #60a5fa;
      text-decoration: underline;
    }

    .markdown-content hr {
      border: none;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      margin: 2rem 0;
    }

    .loading {
      text-align: center;
      padding: 3rem;
      color: #94a3b8;
    }

    .spinner {
      border: 4px solid rgba(59, 130, 246, 0.1);
      border-top: 4px solid #3b82f6;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    footer {
      text-align: center;
      padding: 2rem 0;
      color: #64748b;
      margin-top: 3rem;
    }

    @media (max-width: 768px) {
      .container {
        padding: 1rem;
      }

      h1 {
        font-size: 1.8rem;
      }

      .markdown-content h2 {
        font-size: 1.5rem;
      }

      .markdown-content h3 {
        font-size: 1.2rem;
      }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>📚 Claude Remote Control 監控系統</h1>
      <p class="version">完整技術文件 v2.9</p>
    </header>

    <a href="/claude-remote" class="back-button">← 返回監控介面</a>

    <div class="content-wrapper">
      <div id="content">
        <div class="loading">
          <div class="spinner"></div>
          <p>載入文件中...</p>
        </div>
      </div>
    </div>

    <footer>
      <p>&copy; 2026 System Monitor Team | 最後更新: 2026-02-28</p>
    </footer>
  </div>

  <script>
    async function loadMarkdown() {
      try {
        const response = await fetch('/api/docs/claude-remote-monitoring');
        if (!response.ok) {
          throw new Error('Failed to load documentation');
        }
        const markdown = await response.text();

        // Configure marked
        marked.setOptions({
          breaks: true,
          gfm: true,
          headerIds: true,
          mangle: false
        });

        const html = marked.parse(markdown);
        document.getElementById('content').innerHTML = `
          <div class="markdown-content">
            ${html}
          </div>
        `;

        // Add smooth scroll to anchors
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
          anchor.addEventListener('click', function (e) {
            e.preventDefault();
            const target = document.querySelector(this.getAttribute('href'));
            if (target) {
              target.scrollIntoView({ behavior: 'smooth' });
            }
          });
        });

      } catch (error) {
        document.getElementById('content').innerHTML = `
          <div class="loading">
            <p style="color: #ef4444;">❌ 載入失敗: ${error.message}</p>
            <p style="margin-top: 1rem;">
              <a href="/claude-remote" style="color: #3b82f6;">返回監控介面</a>
            </p>
          </div>
        `;
      }
    }

    // Load markdown on page load
    loadMarkdown();
  </script>
</body>
</html>
